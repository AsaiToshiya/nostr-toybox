<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JSON Broadcast</title>
  </head>
  <body>
    <h1>JSON Broadcast</h1>
    <div style="display: flex; align-items: start">
      JSON:
      <textarea id="json" rows="4" cols="50"></textarea>
    </div>
    relays to:
    <input
      id="relaysTo"
      type="text"
      size="50"
      placeholder="wss://relay.example.com,..."
    /><br />
    <button onclick="handleClick()">broadcast</button><br />
    <div id="nostrich" style="display: none">
      <br />
      <img src="nostrich.gif" style="height: 1.3em; max-height: 1.3em" /><br />
    </div>
    published to:
    <ul id="publishedTo"></ul>

    <script src="https://unpkg.com/nostr-tools@2.10.4/lib/nostr.bundle.js"></script>
    <script>
      const hideNostrich = () => (nostrich.style.display = "none");

      const showNostrich = () => (nostrich.style.display = "inline");

      const handleClick = async () => {
        showNostrich();

        const pool = new window.NostrTools.SimplePool();
        const event = JSON.parse(json.value);
        pool.trackRelays = true;
        await Promise.allSettled(
          pool.publish(relaysTo.value.split(","), event),
        );
        const toRelays = pool.seenOn.get(event.id);
        toRelays &&
          (publishedTo.innerHTML = Array.from(toRelays)
            .map((relay) => `<li>${relay.url}</li>`)
            .join(""));
        hideNostrich();

        json.value = "";
      };
    </script>
  </body>
</html>
